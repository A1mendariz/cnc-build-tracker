<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC Build — Decision Log &amp; BOM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeedea;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #e8e6df;
      --text2: #9c9a92;
      --text3: #6b6965;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 860px; margin: 0 auto; }
  .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  h1 { font-size: 20px; font-weight: 500; }
  .save-indicator {
    font-size: 11px;
    color: #1D9E75;
    opacity: 0;
    transition: opacity 0.4s;
    margin-left: auto;
  }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); }
  .tab {
    font-size: 13px; font-weight: 500; padding: 7px 16px;
    border-radius: var(--radius-md) var(--radius-md) 0 0;
    border: 0.5px solid transparent; background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s; position: relative; bottom: -0.5px;
  }
  .tab:hover { color: var(--text); background: var(--bg3); }
  .tab.active { color: var(--text); background: var(--bg2); border-color: var(--border); border-bottom-color: var(--bg2); }

  /* Summary bar */
  .summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 0.75rem 1rem; }
  .stat-n { font-size: 22px; font-weight: 500; }
  .stat-l { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* Toolbar */
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .filter-btn {
    font-size: 12px; padding: 5px 12px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { background: var(--bg3); color: var(--text); }
  .filter-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); font-weight: 500; }
  .search {
    margin-left: auto; font-size: 13px; padding: 5px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); width: 200px;
  }
  .export-btn {
    font-size: 12px; padding: 5px 12px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer;
  }
  .export-btn:hover { background: var(--bg3); color: var(--text); }

  /* Badges */
  .badge {
    font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: var(--radius-md);
    white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }
  .badge-Frame   { background: #E6F1FB; color: #0C447C; }
  .badge-Motion  { background: #E1F5EE; color: #085041; }
  .badge-Drive   { background: #FAEEDA; color: #633806; }
  .badge-Spindle { background: #FAECE7; color: #712B13; }
  .badge-Control { background: #EEEDFE; color: #3C3489; }
  .badge-Joint   { background: #F1EFE8; color: #444441; }
  .badge-Note    { background: #FBEAF0; color: #72243E; }
  @media (prefers-color-scheme: dark) {
    .badge-Frame   { background: #0C447C; color: #B5D4F4; }
    .badge-Motion  { background: #085041; color: #9FE1CB; }
    .badge-Drive   { background: #633806; color: #FAC775; }
    .badge-Spindle { background: #712B13; color: #F5C4B3; }
    .badge-Control { background: #3C3489; color: #CECBF6; }
    .badge-Joint   { background: #444441; color: #D3D1C7; }
    .badge-Note    { background: #72243E; color: #F4C0D1; }
  }

  /* Decision cards */
  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.875rem 1rem; transition: border-color 0.15s; }
  .card:hover { border-color: var(--border2); }
  .card-top { display: flex; align-items: flex-start; gap: 10px; }
  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .card-decision { font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .card-reason { font-size: 12px; color: var(--text2); line-height: 1.55; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-firm     { background: #1D9E75; }
  .dot-tradeoff { background: #BA7517; }
  .dot-open     { background: #888780; }
  .status-label { font-size: 11px; color: var(--text2); }

  /* Decision add row */
  .add-section { margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--border); display: flex; gap: 8px; }
  .add-section input, .add-section select {
    font-size: 13px; padding: 7px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: var(--bg); color: var(--text);
  }
  .add-section button {
    font-size: 13px; padding: 7px 16px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: transparent; color: var(--text);
    cursor: pointer; white-space: nowrap;
  }
  .add-section button:hover { background: var(--bg3); }

  /* BOM cards — display */
  .bom-cards { display: flex; flex-direction: column; gap: 8px; }
  .bom-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.75rem 1rem; transition: border-color 0.15s; }
  .bom-card:hover { border-color: var(--border2); }
  .bom-card-top { display: flex; align-items: flex-start; gap: 10px; }
  .bom-card-body { flex: 1; min-width: 0; }
  .bom-card-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .bom-card-supplier { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .bom-link { color: inherit; text-decoration: none; border-bottom: 0.5px solid var(--border2); }
  .bom-link:hover { color: var(--text); border-bottom-color: var(--text2); }
  .bom-card-notes { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 6px; }
  .bom-card-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .bom-price-info { font-size: 12px; color: var(--text2); }
  .bom-status { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--radius-md); }
  .bom-status-pending  { background: #F1EFE8; color: #444441; }
  .bom-status-ordered  { background: #FAEEDA; color: #633806; }
  .bom-status-received { background: #E1F5EE; color: #085041; }
  @media (prefers-color-scheme: dark) {
    .bom-status-pending  { background: #444441; color: #D3D1C7; }
    .bom-status-ordered  { background: #633806; color: #FAC775; }
    .bom-status-received { background: #085041; color: #9FE1CB; }
  }
  .edit-btn {
    font-size: 11px; padding: 2px 9px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border); background: transparent; color: var(--text3);
    cursor: pointer; margin-left: auto; flex-shrink: 0;
  }
  .edit-btn:hover { background: var(--bg3); color: var(--text2); border-color: var(--border2); }

  /* BOM cards — edit */
  .bom-card.editing { border-color: var(--border2); }
  .bom-edit-form { display: flex; flex-direction: column; gap: 8px; }
  .bom-edit-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .bom-edit-row input, .bom-edit-row select {
    font-size: 13px; padding: 7px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); min-width: 0;
  }
  .bom-edit-row input.f-grow { flex: 1; }
  .bom-edit-row input.f-sm   { width: 72px; }
  .bom-edit-row input.f-med  { width: 120px; }
  .bom-edit-row input.f-url  { flex: 2; min-width: 160px; }
  .bom-edit-row button {
    font-size: 13px; padding: 7px 14px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: transparent; color: var(--text);
    cursor: pointer; white-space: nowrap;
  }
  .bom-edit-row button:hover { background: var(--bg3); }
  .bom-edit-row .btn-danger { color: #a33; border-color: rgba(180,60,60,0.4); margin-left: auto; }
  .bom-edit-row .btn-danger:hover { background: rgba(180,60,60,0.08); }
  @media (prefers-color-scheme: dark) {
    .bom-edit-row .btn-danger:hover { background: rgba(200,80,80,0.12); }
  }

  /* BOM add form */
  .bom-add-form { margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .bom-add-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .bom-add-row input, .bom-add-row select {
    font-size: 13px; padding: 7px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); min-width: 0;
  }
  .bom-add-row input.f-grow { flex: 1; }
  .bom-add-row input.f-sm   { width: 72px; }
  .bom-add-row input.f-med  { width: 120px; }
  .bom-add-row input.f-url  { flex: 2; min-width: 160px; }
  .bom-add-row button {
    font-size: 13px; padding: 7px 16px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border2); background: transparent; color: var(--text);
    cursor: pointer; white-space: nowrap;
  }
  .bom-add-row button:hover { background: var(--bg3); }

  .empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }
  .error { text-align: center; padding: 2rem; color: #a33; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CNC build</h1>
    <span class="save-indicator" id="save-indicator">Saved</span>
  </div>
  <p class="subtitle">900×600×150 mm moving-gantry router · Wood &amp; aluminum · Started May 2026</p>

  <div class="tabs">
    <button class="tab active" data-tab="decisions" onclick="switchTab('decisions')">Decision log</button>
    <button class="tab" data-tab="bom" onclick="switchTab('bom')">Bill of materials</button>
  </div>

  <!-- ── DECISIONS TAB ── -->
  <div id="tab-decisions">
    <div class="summary-bar">
      <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total decisions</div></div>
      <div class="stat"><div class="stat-n" id="s-firm">—</div><div class="stat-l">Firm</div></div>
      <div class="stat"><div class="stat-n" id="s-open">—</div><div class="stat-l">Open / tradeoff</div></div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" data-f="all" onclick="filter(this)">All</button>
      <button class="filter-btn" data-f="Frame"   onclick="filter(this)">Frame</button>
      <button class="filter-btn" data-f="Motion"  onclick="filter(this)">Motion</button>
      <button class="filter-btn" data-f="Drive"   onclick="filter(this)">Drive</button>
      <button class="filter-btn" data-f="Spindle" onclick="filter(this)">Spindle</button>
      <button class="filter-btn" data-f="Control" onclick="filter(this)">Control</button>
      <button class="filter-btn" data-f="Joint"   onclick="filter(this)">Joint detail</button>
      <button class="filter-btn" data-f="Note"    onclick="filter(this)">Notes</button>
      <input class="search" id="search" placeholder="Search…" oninput="render()" />
      <button class="export-btn" onclick="exportJSON(decisions, 'cnc-decisions.json')">Export JSON</button>
    </div>
    <div class="cards" id="cards"></div>
    <div class="add-section">
      <select id="new-sub">
        <option>Frame</option><option>Motion</option><option>Drive</option>
        <option>Spindle</option><option>Control</option><option>Joint</option><option>Note</option>
      </select>
      <input id="new-text" style="flex:1" placeholder="Decision or open question…" onkeydown="if(event.key==='Enter')addDecision()" />
      <select id="new-status">
        <option value="firm">Firm</option>
        <option value="tradeoff">Tradeoff</option>
        <option value="open">Open</option>
      </select>
      <button onclick="addDecision()">Add</button>
    </div>
  </div>

  <!-- ── BOM TAB ── -->
  <div id="tab-bom" style="display:none">
    <div class="summary-bar">
      <div class="stat"><div class="stat-n" id="b-total">—</div><div class="stat-l">Line items</div></div>
      <div class="stat"><div class="stat-n" id="b-cost">—</div><div class="stat-l">Estimated total</div></div>
      <div class="stat"><div class="stat-n" id="b-received">—</div><div class="stat-l">Received</div></div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" data-bf="all"     onclick="bomFilterFn(this)">All</button>
      <button class="filter-btn" data-bf="Frame"   onclick="bomFilterFn(this)">Frame</button>
      <button class="filter-btn" data-bf="Motion"  onclick="bomFilterFn(this)">Motion</button>
      <button class="filter-btn" data-bf="Drive"   onclick="bomFilterFn(this)">Drive</button>
      <button class="filter-btn" data-bf="Spindle" onclick="bomFilterFn(this)">Spindle</button>
      <button class="filter-btn" data-bf="Control" onclick="bomFilterFn(this)">Control</button>
      <button class="filter-btn" data-bf="Joint"   onclick="bomFilterFn(this)">Joint detail</button>
      <input class="search" id="bom-search" placeholder="Search…" oninput="renderBOM()" />
      <button class="export-btn" onclick="exportJSON(bom, 'cnc-bom.json')">Export JSON</button>
    </div>
    <div class="bom-cards" id="bom-cards"></div>
    <div class="bom-add-form">
      <div class="bom-add-row">
        <select id="bom-sub">
          <option>Frame</option><option>Motion</option><option>Drive</option>
          <option>Spindle</option><option>Control</option><option>Joint</option>
        </select>
        <input id="bom-name"     class="f-grow" placeholder="Part name" />
        <input id="bom-supplier" class="f-med"  placeholder="Supplier" />
        <input id="bom-url"      class="f-url"  placeholder="Product URL (optional)" />
      </div>
      <div class="bom-add-row">
        <input id="bom-qty"   class="f-sm"  type="number" placeholder="Qty"  min="0" step="any" />
        <input id="bom-unit"  class="f-sm"  placeholder="unit" />
        <input id="bom-price" class="f-med" type="number" placeholder="Unit price $" min="0" step="any" />
        <select id="bom-status-sel">
          <option value="pending">Pending</option>
          <option value="ordered">Ordered</option>
          <option value="received">Received</option>
        </select>
        <input id="bom-notes" class="f-grow" placeholder="Notes (optional)" onkeydown="if(event.key==='Enter')addBOMItem()" />
        <button onclick="addBOMItem()">Add item</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let decisions    = [];
let bom          = [];
let activeFilter    = 'all';
let activeBomFilter = 'all';
let editingBOMId    = null;

const SUBS     = ['Frame','Motion','Drive','Spindle','Control','Joint'];
const STATUSES = [['pending','Pending'],['ordered','Ordered'],['received','Received']];

// ── Persistence ────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/data');
    if (!res.ok) throw new Error(res.statusText);
    const json = await res.json();
    decisions = json.decisions || [];
    bom       = json.bom       || [];
  } catch(e) {
    document.getElementById('cards').innerHTML =
      '<div class="error">Could not load data — is the server running?<br><code>node server.js</code></div>';
    document.getElementById('bom-cards').innerHTML =
      '<div class="error">Could not load data — is the server running?<br><code>node server.js</code></div>';
  }
}

async function saveData() {
  try {
    await fetch('/data', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ decisions, bom }, null, 2),
    });
    flashSaved();
  } catch(e) {
    console.error('Save failed:', e);
  }
}

function flashSaved() {
  const el = document.getElementById('save-indicator');
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 1500);
}

// ── Decisions ──────────────────────────────────────────────────────────────
function render() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const filtered = decisions.filter(d => {
    const matchF = activeFilter === 'all' || d.sub === activeFilter;
    const matchQ = !q || [d.title, d.decision, d.reason, d.sub].some(s => s.toLowerCase().includes(q));
    return matchF && matchQ;
  });

  document.getElementById('cards').innerHTML = filtered.length === 0
    ? '<div class="empty">No decisions match.</div>'
    : filtered.map(d => `
      <div class="card">
        <div class="card-top">
          <span class="badge badge-${d.sub}">${d.sub === 'Joint' ? 'Joint detail' : d.sub}</span>
          <div class="card-body">
            <div class="card-title">${esc(d.title)}</div>
            <div class="card-decision">${esc(d.decision)}</div>
            <div class="card-reason">${esc(d.reason)}</div>
            <div class="card-meta">
              <span class="dot dot-${d.status}"></span>
              <span class="status-label">${d.status === 'firm' ? 'Firm' : d.status === 'tradeoff' ? 'Tradeoff / conditional' : 'Open'}</span>
            </div>
          </div>
        </div>
      </div>`).join('');

  document.getElementById('s-total').textContent = decisions.length;
  document.getElementById('s-firm').textContent  = decisions.filter(d => d.status === 'firm').length;
  document.getElementById('s-open').textContent  = decisions.filter(d => d.status !== 'firm').length;
}

function filter(btn) {
  activeFilter = btn.dataset.f;
  document.querySelectorAll('.filter-btn[data-f]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function addDecision() {
  const text = document.getElementById('new-text').value.trim();
  if (!text) return;
  decisions.push({
    id:       Date.now(),
    sub:      document.getElementById('new-sub').value,
    title:    document.getElementById('new-sub').value + ' note',
    decision: text,
    reason:   '',
    status:   document.getElementById('new-status').value,
  });
  saveData();
  document.getElementById('new-text').value = '';
  render();
}

// ── BOM ────────────────────────────────────────────────────────────────────
function fmtCost(n) {
  if (!isFinite(n) || n === 0) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function subOpts(val) {
  return SUBS.map(s => `<option value="${s}"${val === s ? ' selected' : ''}>${s}</option>`).join('');
}
function statusOpts(val) {
  return STATUSES.map(([v, l]) => `<option value="${v}"${val === v ? ' selected' : ''}>${l}</option>`).join('');
}

function renderBOM() {
  const q = (document.getElementById('bom-search')?.value || '').toLowerCase();
  const filtered = bom.filter(d => {
    const matchF = activeBomFilter === 'all' || d.sub === activeBomFilter;
    const matchQ = !q || [d.name, d.supplier, d.notes, d.sub, d.url].some(s => (s || '').toLowerCase().includes(q));
    return matchF && matchQ;
  });

  const statusLabel = Object.fromEntries(STATUSES);
  document.getElementById('bom-cards').innerHTML = filtered.length === 0
    ? '<div class="empty">No items match.</div>'
    : filtered.map(d => d.id === editingBOMId ? renderEditCard(d) : renderBOMCard(d, statusLabel)).join('');

  const totalCost = bom.reduce((sum, d) => {
    const t = (parseFloat(d.qty) || 0) * (parseFloat(d.unitPrice) || 0);
    return sum + (isFinite(t) ? t : 0);
  }, 0);
  document.getElementById('b-total').textContent    = bom.length;
  document.getElementById('b-cost').textContent     = fmtCost(totalCost);
  document.getElementById('b-received').textContent = bom.filter(d => d.status === 'received').length;
}

function renderBOMCard(d, statusLabel) {
  const total    = (parseFloat(d.qty) || 0) * (parseFloat(d.unitPrice) || 0);
  const priceStr = d.unitPrice
    ? `${esc(String(d.qty))} × $${parseFloat(d.unitPrice).toFixed(2)} / ${esc(d.unit || 'pcs')} = <strong>${fmtCost(total)}</strong>`
    : `${esc(String(d.qty))} ${esc(d.unit || 'pcs')}`;
  const suppStr = d.url
    ? `<a class="bom-link" href="${esc(d.url)}" target="_blank" rel="noopener">${esc(d.supplier || d.url)}</a>`
    : (d.supplier ? esc(d.supplier) : `<span style="color:var(--text3)">Supplier TBD</span>`);
  return `
    <div class="bom-card">
      <div class="bom-card-top">
        <span class="badge badge-${d.sub}">${d.sub === 'Joint' ? 'Joint detail' : d.sub}</span>
        <div class="bom-card-body">
          <div class="bom-card-name">${esc(d.name)}</div>
          <div class="bom-card-supplier">${suppStr}</div>
          ${d.notes ? `<div class="bom-card-notes">${esc(d.notes)}</div>` : ''}
          <div class="bom-card-meta">
            <span class="bom-price-info">${priceStr}</span>
            <span class="bom-status bom-status-${d.status}">${statusLabel[d.status] || d.status}</span>
            <button class="edit-btn" onclick="startEdit(${d.id})">Edit</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderEditCard(d) {
  const id = d.id;
  return `
    <div class="bom-card editing">
      <div class="bom-edit-form">
        <div class="bom-edit-row">
          <select id="e-sub-${id}">${subOpts(d.sub)}</select>
          <input id="e-name-${id}"     class="f-grow" value="${esc(d.name)}"     placeholder="Part name" />
          <input id="e-supplier-${id}" class="f-med"  value="${esc(d.supplier)}" placeholder="Supplier" />
          <input id="e-url-${id}"      class="f-url"  value="${esc(d.url)}"      placeholder="Product URL" />
        </div>
        <div class="bom-edit-row">
          <input id="e-qty-${id}"   class="f-sm"  type="number" value="${d.qty}"       min="0" step="any" placeholder="Qty" />
          <input id="e-unit-${id}"  class="f-sm"  value="${esc(d.unit)}"               placeholder="unit" />
          <input id="e-price-${id}" class="f-med" type="number" value="${d.unitPrice}"  min="0" step="any" placeholder="Unit price $" />
          <select id="e-status-${id}">${statusOpts(d.status)}</select>
          <input id="e-notes-${id}" class="f-grow" value="${esc(d.notes)}" placeholder="Notes"
                 onkeydown="if(event.key==='Enter')saveEdit(${id})" />
        </div>
        <div class="bom-edit-row">
          <button onclick="saveEdit(${id})">Save</button>
          <button onclick="cancelEdit()">Cancel</button>
          <button class="btn-danger" onclick="deleteItem(${id})">Delete</button>
        </div>
      </div>
    </div>`;
}

function startEdit(id)  { editingBOMId = id; renderBOM(); }
function cancelEdit()   { editingBOMId = null; renderBOM(); }

function saveEdit(id) {
  const i = bom.findIndex(d => d.id === id);
  if (i === -1) return;
  bom[i] = {
    ...bom[i],
    sub:       document.getElementById(`e-sub-${id}`).value,
    name:      document.getElementById(`e-name-${id}`).value.trim(),
    supplier:  document.getElementById(`e-supplier-${id}`).value.trim(),
    url:       document.getElementById(`e-url-${id}`).value.trim(),
    qty:       parseFloat(document.getElementById(`e-qty-${id}`).value)   || 1,
    unit:      document.getElementById(`e-unit-${id}`).value.trim()       || 'pcs',
    unitPrice: parseFloat(document.getElementById(`e-price-${id}`).value) || 0,
    status:    document.getElementById(`e-status-${id}`).value,
    notes:     document.getElementById(`e-notes-${id}`).value.trim(),
  };
  editingBOMId = null;
  saveData();
  renderBOM();
}

function deleteItem(id) {
  if (!confirm('Delete this item from the BOM?')) return;
  bom = bom.filter(d => d.id !== id);
  editingBOMId = null;
  saveData();
  renderBOM();
}

function bomFilterFn(btn) {
  activeBomFilter = btn.dataset.bf;
  document.querySelectorAll('.filter-btn[data-bf]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBOM();
}

function addBOMItem() {
  const name = document.getElementById('bom-name').value.trim();
  if (!name) return;
  bom.push({
    id:        Date.now(),
    sub:       document.getElementById('bom-sub').value,
    name,
    supplier:  document.getElementById('bom-supplier').value.trim(),
    url:       document.getElementById('bom-url').value.trim(),
    qty:       parseFloat(document.getElementById('bom-qty').value)   || 1,
    unit:      document.getElementById('bom-unit').value.trim()       || 'pcs',
    unitPrice: parseFloat(document.getElementById('bom-price').value) || 0,
    status:    document.getElementById('bom-status-sel').value,
    notes:     document.getElementById('bom-notes').value.trim(),
  });
  saveData();
  ['bom-name','bom-supplier','bom-url','bom-qty','bom-unit','bom-price','bom-notes']
    .forEach(id => { document.getElementById(id).value = ''; });
  renderBOM();
}

// ── Shared ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportJSON(obj, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' }));
  a.download = filename;
  a.click();
}

function switchTab(tab) {
  document.getElementById('tab-decisions').style.display = tab === 'decisions' ? '' : 'none';
  document.getElementById('tab-bom').style.display       = tab === 'bom'       ? '' : 'none';
  document.querySelectorAll('.tab[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
}

// ── Init ───────────────────────────────────────────────────────────────────
loadData().then(() => { render(); renderBOM(); });
</script>
</body>
</html>
